<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - Interactive Form</title>
    <meta name="description" content="Reach out to us through this interactive and beautiful contact form.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="background-elements">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>

    <iframe name="hidden_iframe" id="hidden_iframe" style="display:none;"></iframe>

    <main class="container">
        <div class="form-wrapper">
            <div class="header">
                <h1>Get in Touch</h1>
                <p>We'd love to hear from you. Please fill out this form.</p>
            </div>
            
            <div id="success-message" class="success-message hidden">
                <div class="checkmark-wrapper">
                    <svg class="checkmark" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 52 52">
                        <circle class="checkmark-circle" cx="26" cy="26" r="25" fill="none"/>
                        <path class="checkmark-check" fill="none" d="M14.1 27.2l7.1 7.2 16.7-16.8"/>
                    </svg>
                </div>
                <h2>Message Sent!</h2>
                <p>Thank you for reaching out. We will get back to you shortly.</p>
                <button id="reset-button" class="reset-btn">Send Another Message</button>
            </div>

            <form id="contact-form" class="form" action="https://docs.google.com/forms/d/e/1FAIpQLSedJ7jOFCj5pEsbZmlKJanEdW0k9Z82YCasLfbOsy4BL4_bzg/formResponse" method="POST" target="hidden_iframe">
                <div class="input-group">
                    <input type="text" id="name" name="entry.10453496" required placeholder=" ">
                    <label for="name">Name</label>
                    <div class="line"></div>
                </div>

                <div class="input-group">
                    <input type="email" id="email" name="entry.2111090388" required placeholder=" ">
                    <label for="email">Email Address</label>
                    <div class="line"></div>
                </div>

                <div class="input-group">
                    <input type="text" id="company" name="entry.2065402523" required placeholder=" ">
                    <label for="company">Company</label>
                    <div class="line"></div>
                </div>

                <div class="input-group textarea-group">
                    <textarea id="message" name="entry.613428250" required placeholder=" " rows="4"></textarea>
                    <label for="message">Message</label>
                    <div class="line"></div>
                </div>

                <button type="submit" id="submit-btn" class="submit-btn">
                    <span class="btn-text">Submit</span>
                    <span class="loader hidden"></span>
                </button>
            </form>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
